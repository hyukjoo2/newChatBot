services:
  postgres:
    image: pgvector/pgvector:pg18-trixie
    container_name: local-assistant-postgres

    restart: unless-stopped

    env_file:
      - .env

    environment:
      TZ: Asia/Seoul

    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
    name: local-assistant-postgres-data